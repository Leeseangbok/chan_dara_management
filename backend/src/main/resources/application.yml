spring:
  application:
    name: sbms-backend

  # --- Datasource: Local PostgreSQL ---
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  # --- Multipart (image upload) ---
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    # Stack traces should never leak in production API responses
    include-stacktrace: never

# --- Custom app config: JWT ---
app:
  jwt:
    # 256-bit+ secret, injected via environment variable — never commit this
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXP_MS:86400000}      # 1 day
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP_MS:86400000} # 1 day
    issuer: sbms-backend

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  upload:
    dir: ${UPLOAD_DIR:uploads}

  supabase:
    url: ${SUPABASE_URL}
    key: ${SUPABASE_KEY}
    bucket: ${SUPABASE_BUCKET:product-images}


# --- Actuator (Render health checks) ---
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.smallbiz: DEBUG
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}

---
# --- Profile: local development ---
spring:
  config:
    activate:
      on-profile: local
logging:
  level:
    com.smallbiz: DEBUG
    org.hibernate.SQL: DEBUG

---
# --- Profile: production (Render) ---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    root: WARN
    com.smallbiz: INFO